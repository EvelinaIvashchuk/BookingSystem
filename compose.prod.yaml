services:
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-rentalpass}
      MYSQL_DATABASE: CarRentalDb
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  carrental:
    image: carrental
    build:
      context: .
      dockerfile: BookingSystem/Dockerfile
    restart: always
    ports:
      - "80:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=mysql;Port=3306;Database=CarRentalDb;User=root;Password=${MYSQL_PASSWORD:-rentalpass};
      - Seed__AdminEmail=${ADMIN_EMAIL:-admin@carrental.local}
      - Seed__AdminPassword=${ADMIN_PASSWORD:-Admin@12345}
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
